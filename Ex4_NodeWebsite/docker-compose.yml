services:

  app:
    build: .
    container_name: node-app

    ports:
      - "3000:3000"

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis

    restart: unless-stopped

    volumes:
      - redis-data:/data

volumes:
  redis-data: