name: Deploy Node Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t node-website ./Ex4_NodeWebsite

      # Generate SARIF report (never fails)
      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: node-website
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      # Upload report to GitHub Security
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Security gate - fail only on CRITICAL vulnerabilities
      - name: Fail on Critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: node-website
          format: table
          severity: CRITICAL
          exit-code: 1

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ~/deploy.sh